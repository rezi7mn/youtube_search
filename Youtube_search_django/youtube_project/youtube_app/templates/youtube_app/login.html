{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン - YouTube検索アプリ</title>
    <link rel="stylesheet" href="{% static 'youtube_app/style.css' %}">
</head>
<body style="background-color: #0f0f0f; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
    <div style="background: #1e1e1e; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
        <h2 style="margin-top: 0; text-align: center;">ログイン</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                {% for error in form.non_field_errors %}
                    <p style="color: #ff4d4d; font-size: 0.85em; text-align: center;">{{ error }}</p>
                {% endfor %}
            {% endif %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa;">メールアドレス</label>
                {{ form.username }}
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa;">パスワード</label>
                {{ form.password }}
            </div>
            <button type="submit" style="width: 100%; padding: 12px; background: #cc0000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">ログイン</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 0.9em; color: #aaa;">
            アカウントをお持ちでないですか？ <a href="{% url 'youtube_app:signup' %}" style="color: #3ea6ff; text-decoration: none;">新規登録</a>
        </p>
    </div>
</body>
</html>
