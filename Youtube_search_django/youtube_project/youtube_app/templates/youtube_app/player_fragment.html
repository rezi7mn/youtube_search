{% if selected_video_id %}
<div class="embedded-player">
    <iframe width="100%" height="360" src="https://www.youtube.com/embed/{{ selected_video_id }}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>
{% else %}
<div class="message info">動画が選択されていません。</div>
{% endif %}
