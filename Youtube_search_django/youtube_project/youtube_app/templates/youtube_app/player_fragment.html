{% if selected_video_id %}
<div class="embedded-player">
    <div class="video-id-label" style="margin-bottom:8px; font-size:0.95em; color:#ddd;">動画ID: {{ selected_video_id }}</div>
    <div id="yt-player-{{ selected_video_id }}" style="width:100%; height:360px; background:#000;"></div>
    <script>
        // YouTube IFrame Player API を非同期で読み込む
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player-{{ selected_video_id }}', {
                height: '360',
                width: '100%',
                videoId: '{{ selected_video_id }}',
                events: {
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerError(event) {
            if (event.data === 150) {
                document.getElementById('yt-player-{{ selected_video_id }}').innerHTML = '<div style="color: #ddd; padding: 20px; text-align: center;">埋め込み再生ができない動画です。<br/><a href="https://www.youtube.com/watch?v={{ selected_video_id }}" target="_blank" rel="noopener" style="color: #9cc;">YouTubeで開く</a></div>';
            } else if (event.data === 2) {
                document.getElementById('yt-player-{{ selected_video_id }}').innerHTML = '<div style="color: #ddd; padding: 20px; text-align: center;">無効な動画IDです。</div>';
            }
        }

        // API がまだ読み込まれていなければ再度初期化する
        if (typeof YT !== 'undefined' && YT.loaded === 1) {
            onYouTubeIframeAPIReady();
        }
    </script>

    <div class="player-fallback" style="margin-top:8px; font-size:0.95em; color:#ddd;">
        <p>埋め込み再生に失敗する場合は、以下をお試しください：</p>
        <ul>
            <li><a href="https://www.youtube.com/watch?v={{ selected_video_id }}" target="_blank" rel="noopener" style="color:#9cc">YouTube で開く（新しいタブ）</a></li>
        </ul>
        <p style="opacity:0.8;">※ 埋め込み不可（投稿者が埋め込みを許可していない、年齢制限、地域制限など）の場合、プレイヤーは表示できませんが、YouTubeサイトで視聴できます。</p>
    </div>
</div>
{% else %}
<div class="message info">動画が選択されていません。</div>
{% endif %}
